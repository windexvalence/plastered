{% extends "base_template.html" %}
{% block title %}Plastered Run History{% endblock %}
{% block content %}
<h2>Plastered Run History</h2>
{% if search_id is not none %}
    <div id="run-history-list" hx-get="/api/run_history?search_id={{ search_id }}" hx-target="this" hx-trigger="load"></div>
{% else %}
    <div id="run-history-list" hx-get="/api/run_history" hx-target="this" hx-trigger="load"></div>
{% endif %}
{% endblock %}
